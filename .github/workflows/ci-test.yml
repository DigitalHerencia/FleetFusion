name: ci/test
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm ci
      - run: npx playwright install --with-deps
      - run: npm run test:coverage
      - run: npm run test:e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
