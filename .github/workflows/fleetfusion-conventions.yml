# @format

# Purpose: Enforces FleetFusion-specific coding patterns, conventions, and multi-tenant security
# Triggered by: pull_request_target (opened, edited, synchronize) - runs on base branch for security
# Features: Branch/PR title validation, FleetFusion pattern analysis, security checks, auto-labeling

name: 🚛 FleetFusion Conventions

on:
    pull_request_target:
        types: [opened, edited, synchronize]

jobs:
    enforce-conventions:
        name: FleetFusion Pattern Enforcement
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
            checks: write
            statuses: write
            issues: write

        steps:
            - name: Checkout code
              uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v4.1.6
              with:
                  ref: ${{ github.event.pull_request.head.sha }}
                  fetch-depth: 0

            - name: Validate FleetFusion Patterns
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
              with:
                  script: |
                      const branchName = context.payload.pull_request.head.ref;
                      const prTitle = context.payload.pull_request.title;
                      const validPrefixes = ['feature/', 'feat/', 'fix/', 'bugfix/', 'docs/', 'doc/', 'test/', 'tests/', 'chore/', 'config/', 'refactor/', 'style/', 'ci/', 'hotfix/'];
                      const validTypes = ['feat', 'fix', 'docs', 'test', 'refactor', 'config', 'chore', 'style', 'ci'];

                      let errors = [];
                      let warnings = [];
                      let fleetfusionIssues = [];

                      // Branch validation
                      const hasValidPrefix = validPrefixes.some(prefix => branchName.startsWith(prefix));
                      if (!hasValidPrefix) {
                        errors.push(`❌ **Branch name violation**: "${branchName}" must start with: ${validPrefixes.join(', ')}`);
                      }

                      // PR title validation
                      const titleMatch = prTitle.match(/^(feat|fix|docs|test|refactor|config|chore|style|ci):\s*(.+)$/);
                      if (!titleMatch) {
                        errors.push(`❌ **PR title violation**: "${prTitle}" must follow format: \`type: description\``);
                      } else if (titleMatch[2].length < 10) {
                        warnings.push(`⚠️ **PR title**: Description should be more descriptive (current: ${titleMatch[2].length} chars)`);
                      }

                      // Get changed files for FleetFusion pattern analysis
                      const { data: files } = await github.rest.pulls.listFiles({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        pull_number: context.payload.pull_request.number,
                      });

                      // Analyze FleetFusion-specific patterns
                      for (const file of files) {
                        if (file.filename.includes('lib/actions/') && file.status !== 'removed') {
                          try {
                            const { data: content } = await github.rest.repos.getContent({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              path: file.filename,
                              ref: context.payload.pull_request.head.sha
                            });
                            
                            const fileContent = Buffer.from(content.content, 'base64').toString();
                            
                            // Check FleetFusion server action patterns
                            if (!fileContent.includes("'use server'")) {
                              fleetfusionIssues.push(`🚛 **${file.filename}**: Missing 'use server' directive`);
                            }
                            
                            if (!fileContent.includes('await auth()')) {
                              fleetfusionIssues.push(`🚛 **${file.filename}**: Missing authentication check`);
                            }
                            
                            if (fileContent.includes('prisma.') && !fileContent.includes('organizationId')) {
                              fleetfusionIssues.push(`🚨 **${file.filename}**: Database query without organizationId filtering`);
                            }
                            
                            if (!fileContent.includes('handleError')) {
                              warnings.push(`⚠️ **${file.filename}**: Consider using handleError utility`);
                            }
                          } catch (error) {
                            console.log(`Could not analyze ${file.filename}: ${error.message}`);
                          }
                        }
                        
                        if (file.filename.includes('components/') && file.filename.endsWith('.tsx')) {
                          // Check for proper client/server component usage
                          try {
                            const { data: content } = await github.rest.repos.getContent({
                              owner: context.repo.owner,
                              repo: context.repo.repo,
                              path: file.filename,
                              ref: context.payload.pull_request.head.sha
                            });
                            
                            const fileContent = Buffer.from(content.content, 'base64').toString();
                            
                            if (fileContent.includes('useState') || fileContent.includes('useEffect')) {
                              if (!fileContent.includes("'use client'")) {
                                fleetfusionIssues.push(`🚛 **${file.filename}**: Interactive component missing 'use client' directive`);
                              }
                            }
                          } catch (error) {
                            console.log(`Could not analyze ${file.filename}: ${error.message}`);
                          }
                        }
                      }

                      // Generate comment
                      let comment = `## 🚛 FleetFusion DevOps Agent Report\n\n`;
                      comment += `**Branch**: \`${branchName}\`\n`;
                      comment += `**PR Title**: \`${prTitle}\`\n`;
                      comment += `**Files Analyzed**: ${files.length}\n\n`;

                      if (errors.length > 0) {
                        comment += `### ❌ Convention Violations\n\n`;
                        errors.forEach(error => comment += `${error}\n`);
                        comment += `\n`;
                      }

                      if (fleetfusionIssues.length > 0) {
                        comment += `### 🚨 FleetFusion Pattern Issues\n\n`;
                        fleetfusionIssues.forEach(issue => comment += `${issue}\n`);
                        comment += `\n`;
                      }

                      if (warnings.length > 0) {
                        comment += `### ⚠️ Recommendations\n\n`;
                        warnings.forEach(warning => comment += `${warning}\n`);
                        comment += `\n`;
                      }

                      if (errors.length === 0 && fleetfusionIssues.length === 0) {
                        comment += `### ✅ Excellent Work!\n\n`;
                        comment += `This PR follows all FleetFusion conventions and security patterns!\n\n`;
                        comment += `**Pattern Compliance:**\n`;
                        comment += `- ✅ Multi-tenant isolation\n`;
                        comment += `- ✅ Authentication patterns\n`;
                        comment += `- ✅ Server/Client component usage\n`;
                        comment += `- ✅ Error handling\n\n`;
                      } else {
                        comment += `### 🛠️ Required Actions\n\n`;
                        comment += `Please address the issues above before merging. Need help?\n`;
                        comment += `- 📖 [Architecture Guide](.wiki/Architecture.md)\n`;
                        comment += `- 🔒 [Security Patterns](.wiki/Authentication.md)\n`;
                        comment += `- 🚛 [FleetFusion Conventions](.models/agents.md)\n\n`;
                      }

                      comment += `### 🎯 Quick Fix Examples\n\n`;
                      comment += `**Secure Server Action Pattern:**\n`;
                      comment += `\`\`\`typescript\n`;
                      comment += `'use server';\n`;
                      comment += `export async function updateVehicle(orgId: string, vehicleId: string, data: UpdateVehicleData) {\n`;
                      comment += `  const { userId } = await auth();\n`;
                      comment += `  if (!userId) throw new Error('Unauthorized');\n\n`;
                      comment += `  const user = await getCurrentUser();\n`;
                      comment += `  if (user?.organizationId !== orgId) throw new Error('Forbidden');\n\n`;
                      comment += `  return await prisma.vehicle.update({\n`;
                      comment += `    where: { id: vehicleId, organizationId: orgId },\n`;
                      comment += `    data\n`;
                      comment += `  });\n`;
                      comment += `}\n`;
                      comment += `\`\`\`\n\n`;

                      comment += `---\n*FleetFusion DevOps Agent* 🤖`;

                      // Find existing comment to update or create new one
                      const { data: comments } = await github.rest.issues.listComments({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: context.payload.pull_request.number,
                      });

                      const botComment = comments.find(comment => 
                        comment.user.type === 'Bot' && comment.body.includes('FleetFusion DevOps Agent')
                      );

                      if (botComment) {
                        await github.rest.issues.updateComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          comment_id: botComment.id,
                          body: comment
                        });
                      } else {
                        await github.rest.issues.createComment({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          body: comment
                        });
                      }

                      // Set status check
                      const hasFailures = errors.length > 0 || fleetfusionIssues.length > 0;
                      await github.rest.repos.createCommitStatus({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        sha: context.payload.pull_request.head.sha,
                        state: hasFailures ? 'failure' : 'success',
                        target_url: `${context.payload.pull_request.html_url}#issuecomment-`,
                        description: hasFailures ? 
                          `${errors.length + fleetfusionIssues.length} issues found` : 
                          'FleetFusion patterns validated',
                        context: 'FleetFusion Agent'
                      });

                      // Auto-label based on branch type
                      const labels = [];
                      if (branchName.startsWith('feature/') || branchName.startsWith('feat/')) {
                        labels.push('Feature');
                      } else if (branchName.startsWith('fix/') || branchName.startsWith('bugfix/')) {
                        labels.push('Bug');
                      } else if (branchName.startsWith('docs/') || branchName.startsWith('doc/')) {
                        labels.push('Documentation');
                      } else if (branchName.startsWith('test/') || branchName.startsWith('tests/')) {
                        labels.push('Testing');
                      } else if (branchName.startsWith('refactor/')) {
                        labels.push('Code-Quality');
                      } else if (branchName.startsWith('config/') || branchName.startsWith('ci/')) {
                        labels.push('Configuration');
                      }

                      if (hasFailures) {
                        labels.push('needs-fixes');
                      }

                      if (labels.length > 0) {
                        await github.rest.issues.addLabels({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          issue_number: context.payload.pull_request.number,
                          labels: labels
                        });
                      }

            - name: Notify on failure
              if: failure()
              uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
              with:
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const workflowUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

                      const failureMessage = `## 🚨 FleetFusion Conventions Check Failed

                      The automated FleetFusion pattern validation has failed. This may indicate:
                      - Workflow configuration issues
                      - GitHub API rate limiting
                      - File access problems during pattern analysis

                      **Workflow Run:** [View Logs](${workflowUrl})
                      **PR:** #${prNumber}
                      **Branch:** ${context.payload.pull_request.head.ref}

                      Please check the workflow logs for specific error details and re-run if needed.

                      ---
                      *This is an automated notification from FleetFusion DevOps* 🚛⚠️`;

                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: prNumber,
                        body: failureMessage
                      });
